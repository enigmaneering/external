name: Build and Release Vendor Tools

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-glslang:
    name: Build glslang
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            runner: macos-14  # ARM64
            platform: darwin-arm64
            macos_arch: arm64
          - os: macos-latest
            runner: macos-14  # Cross-compile x86_64 on ARM64
            platform: darwin-amd64
            macos_arch: x86_64
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: linux-amd64
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-latest
            runner: windows-latest
            platform: windows-amd64
            mingw_arch: x86_64
          - os: windows-latest
            runner: windows-latest
            platform: windows-arm64
            mingw_arch: x86_64
            cross_compile_target: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MinGW (Windows)
        if: matrix.mingw_arch
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          cache: true
          install: >-
            mingw-w64-${{ matrix.mingw_arch }}-gcc
            mingw-w64-${{ matrix.mingw_arch }}-cmake
            mingw-w64-${{ matrix.mingw_arch }}-ninja
            mingw-w64-${{ matrix.mingw_arch }}-python
            mingw-w64-${{ matrix.mingw_arch }}-clang
            mingw-w64-${{ matrix.mingw_arch }}-lld
            git
            make

      - name: Cache llvm-mingw
        if: matrix.cross_compile_target == 'aarch64'
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: llvm-mingw-20260311-ucrt-x86_64
          key: llvm-mingw-20260311-ucrt-x86_64

      - name: Download ARM64 MinGW runtime libraries
        if: matrix.cross_compile_target == 'aarch64' && steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # Download llvm-mingw which has ARM64 runtime libraries
          curl -L -o llvm-mingw.zip https://github.com/mstorsjo/llvm-mingw/releases/download/20260311/llvm-mingw-20260311-ucrt-x86_64.zip
          unzip -q llvm-mingw.zip

      - name: Setup ARM64 libraries
        if: matrix.cross_compile_target == 'aarch64'
        shell: bash
        run: |
          # Copy ARM64 libraries to a location where the linker can find them (use Windows path)
          mkdir -p D:/a/_temp/msys64/mingw64/aarch64-w64-mingw32
          cp -r llvm-mingw-20260311-ucrt-x86_64/aarch64-w64-mingw32/* D:/a/_temp/msys64/mingw64/aarch64-w64-mingw32/

      - name: Build glslang (Windows)
        if: matrix.mingw_arch
        shell: msys2 {0}
        run: |
          echo "DEBUG: Checking for clang..."
          which clang || echo "clang not found"
          which clang.exe || echo "clang.exe not found"
          ls -la /mingw64/bin/clang* || echo "No clang binaries found"
          echo "DEBUG: PATH=$PATH"
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          USE_MINGW=1 \
          CROSS_COMPILE_TARGET="${{ matrix.cross_compile_target || '' }}" \
          bash scripts/build-glslang.sh

      - name: Build glslang (macOS/Linux)
        if: ${{ !matrix.mingw_arch }}
        shell: bash
        run: |
          chmod +x scripts/build-glslang.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          MACOS_ARCH="${{ matrix.macos_arch || '' }}" \
          bash scripts/build-glslang.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glslang-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/glslang-${{ matrix.platform }}.*

  build-spirv-cross:
    name: Build SPIRV-Cross
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            runner: macos-14  # ARM64
            platform: darwin-arm64
            macos_arch: arm64
          - os: macos-latest
            runner: macos-14  # Cross-compile x86_64 on ARM64
            platform: darwin-amd64
            macos_arch: x86_64
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: linux-amd64
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-latest
            runner: windows-latest
            platform: windows-amd64
            mingw_arch: x86_64
          - os: windows-latest
            runner: windows-latest
            platform: windows-arm64
            mingw_arch: x86_64
            cross_compile_target: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MinGW (Windows)
        if: matrix.mingw_arch
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          cache: true
          install: >-
            mingw-w64-${{ matrix.mingw_arch }}-gcc
            mingw-w64-${{ matrix.mingw_arch }}-cmake
            mingw-w64-${{ matrix.mingw_arch }}-ninja
            mingw-w64-${{ matrix.mingw_arch }}-clang
            mingw-w64-${{ matrix.mingw_arch }}-lld
            git
            make

      - name: Cache llvm-mingw
        if: matrix.cross_compile_target == 'aarch64'
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: llvm-mingw-20260311-ucrt-x86_64
          key: llvm-mingw-20260311-ucrt-x86_64

      - name: Download ARM64 MinGW runtime libraries
        if: matrix.cross_compile_target == 'aarch64' && steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # Download llvm-mingw which has ARM64 runtime libraries
          curl -L -o llvm-mingw.zip https://github.com/mstorsjo/llvm-mingw/releases/download/20260311/llvm-mingw-20260311-ucrt-x86_64.zip
          unzip -q llvm-mingw.zip

      - name: Setup ARM64 libraries
        if: matrix.cross_compile_target == 'aarch64'
        shell: bash
        run: |
          # Copy ARM64 libraries to a location where the linker can find them (use Windows path)
          mkdir -p D:/a/_temp/msys64/mingw64/aarch64-w64-mingw32
          cp -r llvm-mingw-20260311-ucrt-x86_64/aarch64-w64-mingw32/* D:/a/_temp/msys64/mingw64/aarch64-w64-mingw32/

      - name: Build SPIRV-Cross (Windows)
        if: matrix.mingw_arch
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          USE_MINGW=1 \
          CROSS_COMPILE_TARGET="${{ matrix.cross_compile_target || '' }}" \
          bash scripts/build-spirv-cross.sh

      - name: Build SPIRV-Cross (macOS/Linux)
        if: ${{ !matrix.mingw_arch }}
        shell: bash
        run: |
          chmod +x scripts/build-spirv-cross.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          MACOS_ARCH="${{ matrix.macos_arch || '' }}" \
          bash scripts/build-spirv-cross.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spirv-cross-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/spirv-cross-${{ matrix.platform }}.*

  build-dxc:
    name: Build DXC (from source)
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            runner: macos-14  # ARM64
            platform: darwin-arm64
            macos_arch: arm64
          - os: macos-latest
            runner: macos-14  # Cross-compile x86_64 on ARM64
            platform: darwin-amd64
            macos_arch: x86_64
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            platform: linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies for DXC (Linux ARM64)
        if: matrix.platform == 'linux-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-11 g++-11 python3
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-11 100

      - name: Build DXC (macOS/Linux)
        shell: bash
        run: |
          chmod +x scripts/build-dxc.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          MACOS_ARCH="${{ matrix.macos_arch || '' }}" \
          bash scripts/build-dxc.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxc-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/dxc-${{ matrix.platform }}.*

  download-dxc-prebuilt:
    name: Download DXC (Prebuilt from NuGet)
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux-amd64
            os: ubuntu-latest
            nuget_arch: x64
            archive_ext: tar.gz
          - platform: windows-amd64
            os: windows-latest
            nuget_arch: x64
            archive_ext: zip
          - platform: windows-arm64
            os: windows-latest
            nuget_arch: arm64
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Download DXC from NuGet
        shell: pwsh
        run: |
          $version = "1.9.2602.17"
          $package = "Microsoft.Direct3D.DXC"
          $platform = "${{ matrix.platform }}"
          $arch = "${{ matrix.nuget_arch }}"

          Write-Host "Downloading $package version $version from NuGet for $platform"

          # Download NuGet package
          $nugetUrl = "https://www.nuget.org/api/v2/package/$package/$version"
          Invoke-WebRequest -Uri $nugetUrl -OutFile "dxc.nupkg"

          # NuGet packages are zip files
          Expand-Archive -Path "dxc.nupkg" -DestinationPath "nuget-extract"

          # Debug: Show package structure
          Write-Host "Package structure:"
          Get-ChildItem -Path "nuget-extract/bin" -Recurse | Select-Object FullName

          # Create output directory
          New-Item -ItemType Directory -Force -Path "output/dxc-$platform"

          # Determine which binaries to copy based on platform
          if ($platform -like "windows-*") {
              # Windows: bin/{arch}/*
              Copy-Item -Path "nuget-extract/bin/$arch/*" -Destination "output/dxc-$platform/" -Recurse
          } else {
              # Linux: Try different possible paths
              $linuxPaths = @(
                  "nuget-extract/bin/linux_$arch",
                  "nuget-extract/bin/$arch/linux",
                  "nuget-extract/bin/linux/$arch",
                  "nuget-extract/bin/$arch"
              )

              $found = $false
              foreach ($path in $linuxPaths) {
                  if (Test-Path $path) {
                      Write-Host "Found Linux binaries at: $path"
                      Copy-Item -Path "$path/*" -Destination "output/dxc-$platform/" -Recurse
                      $found = $true
                      break
                  }
              }

              if (-not $found) {
                  Write-Error "Could not find Linux binaries in NuGet package"
                  exit 1
              }
          }

          # Create archive
          cd output
          if ("${{ matrix.archive_ext }}" -eq "zip") {
              Compress-Archive -Path "dxc-$platform" -DestinationPath "dxc-$platform.zip"
          } else {
              tar -czf "dxc-$platform.tar.gz" "dxc-$platform"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxc-${{ matrix.platform }}
          path: output/dxc-${{ matrix.platform }}.${{ matrix.archive_ext }}

  create-release:
    name: Create Release
    needs: [build-glslang, build-spirv-cross, build-dxc, download-dxc-prebuilt]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifact structure
        run: ls -R artifacts

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          body: |
            # Vendor Tools Release ${{ steps.version.outputs.version }}

            Pre-built shader compilation toolchain for all platforms.

            ## Included Tools

            - **glslang** - GLSL to SPIRV compiler with optimizer
            - **SPIRV-Cross** - SPIRV transpiler (GLSL/HLSL/MSL)
            - **DXC** - DirectX Shader Compiler (HLSL to SPIRV/DXIL)

            ## Supported Platforms

            - macOS ARM64 (Apple Silicon)
            - macOS x86_64 (Intel)
            - Linux x86_64
            - Windows x86_64

            ## Usage

            Download the appropriate archives for your platform and extract to your project's `external/` directory.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
