name: Verify Upstream Licenses

on:
  schedule:
    # Run daily at 3 AM UTC (after version check at 2 AM)
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  verify-licenses:
    name: Verify License Hashes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone and hash upstream licenses
        run: |
          set -e

          echo "Cloning upstream repositories to check licenses..."

          # Create temp directory
          mkdir -p /tmp/license-check
          cd /tmp/license-check

          # Clone glslang and dependencies
          echo "Checking glslang..."
          git clone --depth 1 https://github.com/KhronosGroup/glslang.git
          git clone --depth 1 https://github.com/KhronosGroup/SPIRV-Tools.git spirv-tools
          git clone --depth 1 https://github.com/KhronosGroup/SPIRV-Headers.git spirv-headers

          # Clone SPIRV-Cross
          echo "Checking SPIRV-Cross..."
          git clone --depth 1 https://github.com/KhronosGroup/SPIRV-Cross.git spirv-cross

          # Clone DXC
          echo "Checking DXC..."
          git clone --depth 1 https://github.com/microsoft/DirectXShaderCompiler.git dxc

          # Clone wgpu-native
          echo "Checking wgpu-native..."
          git clone --depth 1 https://github.com/gfx-rs/wgpu-native.git wgpu-native

          # Compute hashes
          echo "Computing license file hashes..."

          # glslang
          GLSLANG_HASH=$(sha256sum glslang/LICENSE.txt | awk '{print $1}')
          echo "glslang LICENSE.txt: $GLSLANG_HASH"

          # SPIRV-Tools
          SPIRV_TOOLS_HASH=$(sha256sum spirv-tools/LICENSE | awk '{print $1}')
          echo "SPIRV-Tools LICENSE: $SPIRV_TOOLS_HASH"

          # SPIRV-Headers
          SPIRV_HEADERS_HASH=$(sha256sum spirv-headers/LICENSE | awk '{print $1}')
          echo "SPIRV-Headers LICENSE: $SPIRV_HEADERS_HASH"

          # SPIRV-Cross
          SPIRV_CROSS_HASH=$(sha256sum spirv-cross/LICENSE | awk '{print $1}')
          echo "SPIRV-Cross LICENSE: $SPIRV_CROSS_HASH"

          # DXC main license
          DXC_HASH=$(sha256sum dxc/LICENSE.TXT | awk '{print $1}')
          echo "DXC LICENSE.TXT: $DXC_HASH"

          # DXC DxilCompression license
          DXIL_COMP_HASH=$(sha256sum dxc/lib/DxilCompression/LICENSE.TXT | awk '{print $1}')
          echo "DxilCompression LICENSE.TXT: $DXIL_COMP_HASH"

          # wgpu-native (dual-licensed MIT + Apache 2.0)
          WGPU_MIT_HASH=$(sha256sum wgpu-native/LICENSE.MIT | awk '{print $1}')
          echo "wgpu-native LICENSE.MIT: $WGPU_MIT_HASH"
          WGPU_APACHE_HASH=$(sha256sum wgpu-native/LICENSE.APACHE | awk '{print $1}')
          echo "wgpu-native LICENSE.APACHE: $WGPU_APACHE_HASH"

          # Expected hashes (update these when licenses legitimately change)
          # These are reference hashes - if they change, the workflow will fail
          # and we'll be notified to review the license changes

          EXPECTED_GLSLANG="d32239bcb673463ab874e80d47fae504058cabee"
          EXPECTED_SPIRV_TOOLS="cfc7749b96f63bd31c3c42b5c471bf756814053e"
          EXPECTED_SPIRV_HEADERS="8b6f74f707c7f23eb1b2a1e0e7ceb606e5f08e59"
          EXPECTED_SPIRV_CROSS="cfc7749b96f63bd31c3c42b5c471bf756814053e"
          EXPECTED_DXC="92a0a168b32b6c7ac5f98d8e37f8ca9a8cef8c6c"
          EXPECTED_DXIL_COMP="44691df3f2f98e01e3edf0b3f7f2f5f5f7f5f7f5"

          # Note: Using placeholders above - these will be updated on first run
          # The workflow will fail on first run, allowing us to capture the actual hashes

          # Store all hashes in a file
          cat > /tmp/license-hashes.txt <<EOF
          glslang=$GLSLANG_HASH
          spirv-tools=$SPIRV_TOOLS_HASH
          spirv-headers=$SPIRV_HEADERS_HASH
          spirv-cross=$SPIRV_CROSS_HASH
          dxc=$DXC_HASH
          dxil-compression=$DXIL_COMP_HASH
          wgpu-mit=$WGPU_MIT_HASH
          wgpu-apache=$WGPU_APACHE_HASH
          EOF

          echo "=== Current License Hashes ==="
          cat /tmp/license-hashes.txt
          echo "=============================="

      - name: Check for license changes
        run: |
          set -e

          # Expected hashes (SHA256)
          # IMPORTANT: Update these when licenses are reviewed and approved
          # If a hash doesn't match, the build will fail and notify us

          # Last verified: 2026-03-15
          EXPECTED_GLSLANG="17e70c676e1521ff3e4686f04a2053d93a7e28a33be8de7ec37ab0ff72feb677"
          EXPECTED_SPIRV_TOOLS="cfc7749b96f63bd31c3c42b5c471bf756814053e847c10f3eb003417bc523d30"
          EXPECTED_SPIRV_HEADERS="ea43b1de38a6f90c488800d66dec1ed671e68cda530266bc96951fb5b6307613"
          EXPECTED_SPIRV_CROSS="cfc7749b96f63bd31c3c42b5c471bf756814053e847c10f3eb003417bc523d30"
          EXPECTED_DXC="27a49e35d1da96eba18fba54bc882667ff0ff8c0254f16f2b6e165d605ba7df8"
          EXPECTED_DXIL_COMP="6f20fa7672b00e2e975c291df737cf227addf3ad32e36fef3fe0f416e4664d3d"
          EXPECTED_WGPU_MIT="c7fea58d1cfe49634cd92e54fc10a9d871f4b275321a4cd8c09e449122caaeb4"
          EXPECTED_WGPU_APACHE="a6cba85bc92e0cff7a450b1d873c0eaa2e9fc96bf472df0247a26bec77bf3ff9"

          # Read actual hashes
          cd /tmp/license-check
          ACTUAL_GLSLANG=$(sha256sum glslang/LICENSE.txt | awk '{print $1}')
          ACTUAL_SPIRV_TOOLS=$(sha256sum spirv-tools/LICENSE | awk '{print $1}')
          ACTUAL_SPIRV_HEADERS=$(sha256sum spirv-headers/LICENSE | awk '{print $1}')
          ACTUAL_SPIRV_CROSS=$(sha256sum spirv-cross/LICENSE | awk '{print $1}')
          ACTUAL_DXC=$(sha256sum dxc/LICENSE.TXT | awk '{print $1}')
          ACTUAL_DXIL_COMP=$(sha256sum dxc/lib/DxilCompression/LICENSE.TXT | awk '{print $1}')
          ACTUAL_WGPU_MIT=$(sha256sum wgpu-native/LICENSE.MIT | awk '{print $1}')
          ACTUAL_WGPU_APACHE=$(sha256sum wgpu-native/LICENSE.APACHE | awk '{print $1}')

          FAILED=0

          # Check each license
          if [ "$ACTUAL_GLSLANG" != "$EXPECTED_GLSLANG" ]; then
            echo "❌ ERROR: glslang LICENSE.txt has changed!"
            echo "   Expected: $EXPECTED_GLSLANG"
            echo "   Actual:   $ACTUAL_GLSLANG"
            FAILED=1
          else
            echo "✅ glslang license unchanged"
          fi

          if [ "$ACTUAL_SPIRV_TOOLS" != "$EXPECTED_SPIRV_TOOLS" ]; then
            echo "❌ ERROR: SPIRV-Tools LICENSE has changed!"
            echo "   Expected: $EXPECTED_SPIRV_TOOLS"
            echo "   Actual:   $ACTUAL_SPIRV_TOOLS"
            FAILED=1
          else
            echo "✅ SPIRV-Tools license unchanged"
          fi

          if [ "$ACTUAL_SPIRV_HEADERS" != "$EXPECTED_SPIRV_HEADERS" ]; then
            echo "❌ ERROR: SPIRV-Headers LICENSE has changed!"
            echo "   Expected: $EXPECTED_SPIRV_HEADERS"
            echo "   Actual:   $ACTUAL_SPIRV_HEADERS"
            FAILED=1
          else
            echo "✅ SPIRV-Headers license unchanged"
          fi

          if [ "$ACTUAL_SPIRV_CROSS" != "$EXPECTED_SPIRV_CROSS" ]; then
            echo "❌ ERROR: SPIRV-Cross LICENSE has changed!"
            echo "   Expected: $EXPECTED_SPIRV_CROSS"
            echo "   Actual:   $ACTUAL_SPIRV_CROSS"
            FAILED=1
          else
            echo "✅ SPIRV-Cross license unchanged"
          fi

          if [ "$ACTUAL_DXC" != "$EXPECTED_DXC" ]; then
            echo "❌ ERROR: DXC LICENSE.TXT has changed!"
            echo "   Expected: $EXPECTED_DXC"
            echo "   Actual:   $ACTUAL_DXC"
            FAILED=1
          else
            echo "✅ DXC license unchanged"
          fi

          if [ "$ACTUAL_DXIL_COMP" != "$EXPECTED_DXIL_COMP" ]; then
            echo "❌ ERROR: DxilCompression LICENSE.TXT has changed!"
            echo "   Expected: $EXPECTED_DXIL_COMP"
            echo "   Actual:   $ACTUAL_DXIL_COMP"
            FAILED=1
          else
            echo "✅ DxilCompression license unchanged"
          fi

          if [ "$ACTUAL_WGPU_MIT" != "$EXPECTED_WGPU_MIT" ]; then
            echo "❌ ERROR: wgpu-native LICENSE.MIT has changed!"
            echo "   Expected: $EXPECTED_WGPU_MIT"
            echo "   Actual:   $ACTUAL_WGPU_MIT"
            FAILED=1
          else
            echo "✅ wgpu-native MIT license unchanged"
          fi

          if [ "$ACTUAL_WGPU_APACHE" != "$EXPECTED_WGPU_APACHE" ]; then
            echo "❌ ERROR: wgpu-native LICENSE.APACHE has changed!"
            echo "   Expected: $EXPECTED_WGPU_APACHE"
            echo "   Actual:   $ACTUAL_WGPU_APACHE"
            FAILED=1
          else
            echo "✅ wgpu-native Apache license unchanged"
          fi

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "================================================"
            echo "LICENSE CHANGE DETECTED!"
            echo "================================================"
            echo "One or more upstream licenses have changed."
            echo "Please review the license changes and:"
            echo "1. Verify they are still permissive"
            echo "2. Update the expected hashes in this workflow"
            echo "3. Update README-licenses.md if needed"
            echo "================================================"
            exit 1
          fi

          echo ""
          echo "✅ All licenses verified - no changes detected"

      - name: Create issue on license change
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '⚠️ Upstream License Change Detected';
            const body = `An automated check has detected that one or more upstream licenses have changed.

            **Action Required:**
            1. Review the workflow run logs to see which license(s) changed
            2. Review the new license text to ensure it's still permissive
            3. Update the expected hashes in \`.github/workflows/verify-licenses.yml\`
            4. Update \`README-licenses.md\` if the license type changed
            5. Close this issue

            **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            `;

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'license-change'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['license-change', 'automated']
              });
            }
